<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medical GraphRAG · Q&A</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header ── */
        header {
            width: 100%;
            max-width: 800px;
            padding: 20px 24px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: .3px;
        }

        header span {
            font-size: .75rem;
            color: #64748b;
        }

        /* ── Chat window ── */
        #chat {
            flex: 1;
            width: 100%;
            max-width: 800px;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* welcome state */
        #welcome {
            margin: auto;
            text-align: center;
            color: #475569;
            pointer-events: none;
        }

        #welcome .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        #welcome p {
            font-size: .95rem;
            line-height: 1.6;
        }

        /* message bubbles */
        .msg {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            max-width: 100%;
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .msg.assistant .avatar {
            background: #1e3a5f;
        }

        .msg.user .avatar {
            background: #1e3a5f;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            line-height: 1.65;
            font-size: .93rem;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg.assistant .bubble {
            background: #1e293b;
            border-top-left-radius: 4px;
        }

        .msg.user .bubble {
            background: #1d4ed8;
            border-top-right-radius: 4px;
        }

        /* typing indicator */
        .typing .bubble {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce .9s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: .15s;
        }

        .dot:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-6px);
            }
        }

        /* ── Input area ── */
        #input-area {
            width: 100%;
            max-width: 800px;
            padding: 14px 16px 20px;
            border-top: 1px solid #1e293b;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #question {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-size: .93rem;
            resize: none;
            min-height: 48px;
            max-height: 160px;
            line-height: 1.5;
            outline: none;
            transition: border-color .2s;
            field-sizing: content;
            /* auto-grow in modern browsers */
        }

        #question:focus {
            border-color: #3b82f6;
        }

        #question::placeholder {
            color: #475569;
        }

        #send-btn {
            background: #2563eb;
            border: none;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transition: background .2s, transform .1s;
            flex-shrink: 0;
        }

        #send-btn:hover:not(:disabled) {
            background: #1d4ed8;
        }

        #send-btn:active:not(:disabled) {
            transform: scale(.95);
        }

        #send-btn:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
        }

        .hint {
            margin-top: 8px;
            text-align: center;
            font-size: .72rem;
            color: #334155;
        }

        /* scrollbar */
        #chat::-webkit-scrollbar {
            width: 6px;
        }

        #chat::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">🧬</div>
        <div>
            <h1>Medical GraphRAG</h1>
            <span>Agentic Q&amp;A · powered by Neo4j + LLM</span>
        </div>
    </header>

    <div id="chat">
        <div id="welcome">
            <div class="icon">💬</div>
            <p>Ask any medical question.<br>The agent will retrieve knowledge from the graph and answer you.</p>
        </div>
    </div>

    <div id="input-area">
        <div class="input-row">
            <textarea id="question" placeholder="Type your medical question…" rows="1"></textarea>
            <button id="send-btn" title="Send" aria-label="Send">&#9654;</button>
        </div>
        <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const welcome = document.getElementById('welcome');
        const textarea = document.getElementById('question');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(role, text) {
            if (welcome) welcome.style.display = 'none';

            const msg = document.createElement('div');
            msg.className = `msg ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '🧑' : '🤖';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        function addTyping() {
            if (welcome) welcome.style.display = 'none';
            const msg = document.createElement('div');
            msg.className = 'msg assistant typing';
            msg.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        async function sendQuestion() {
            const question = textarea.value.trim();
            if (!question) return;

            textarea.value = '';
            textarea.style.height = '';
            sendBtn.disabled = true;

            addMessage('user', question);
            const typingEl = addTyping();

            try {
                const res = await fetch('/qa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                typingEl.remove();

                if (!res.ok) {
                    const err = await res.text();
                    addMessage('assistant', `⚠️ Server error (${res.status}): ${err}`);
                    return;
                }

                const data = await res.json();
                addMessage('assistant', data.answer);
            } catch (e) {
                typingEl.remove();
                addMessage('assistant', `⚠️ Could not reach the API.\n${e.message}`);
            } finally {
                sendBtn.disabled = false;
                textarea.focus();
            }
        }

        sendBtn.addEventListener('click', sendQuestion);

        textarea.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuestion();
            }
        });

        // auto-grow fallback for browsers that don't support field-sizing
        textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
        });
    </script>
</body>

</html>
